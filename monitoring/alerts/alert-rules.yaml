# =============================================================================
# Prometheus Alert Rules
# Author: Vishnu Raj
# Description: Production-grade alerting rules for cluster health monitoring
# =============================================================================

apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: cluster-alert-rules
  namespace: monitoring
  labels:
    release: prometheus
    app: kube-prometheus-stack
spec:
  groups:

    # ── Node Alerts ─────────────────────────────────────────────────────────
    - name: node.alerts
      rules:

        - alert: NodeNotReady
          expr: kube_node_status_condition{condition="Ready",status="true"} == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Node {{ $labels.node }} is not ready"
            description: "Node {{ $labels.node }} has been in NotReady state for more than 2 minutes."

        - alert: HighNodeCPUUsage
          expr: (100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)) > 80
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High CPU usage on {{ $labels.instance }}"
            description: "CPU usage on {{ $labels.instance }} is above 80% for 5 minutes (current: {{ $value }}%)."

        - alert: HighNodeMemoryUsage
          expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High memory usage on {{ $labels.instance }}"
            description: "Memory usage on {{ $labels.instance }} is above 85% (current: {{ $value }}%)."

        - alert: NodeDiskPressure
          expr: kube_node_status_condition{condition="DiskPressure",status="true"} == 1
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Disk pressure on node {{ $labels.node }}"
            description: "Node {{ $labels.node }} is under disk pressure."

    # ── Pod Alerts ──────────────────────────────────────────────────────────
    - name: pod.alerts
      rules:

        - alert: PodCrashLooping
          expr: rate(kube_pod_container_status_restarts_total[15m]) * 60 * 15 > 5
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is crash looping"
            description: "Container {{ $labels.container }} in pod {{ $labels.pod }} ({{ $labels.namespace }}) has restarted more than 5 times in 15 minutes."

        - alert: PodNotRunning
          expr: kube_pod_status_phase{phase=~"Pending|Unknown|Failed"} > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is not running"
            description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} has been in {{ $labels.phase }} state for more than 5 minutes."

        - alert: PodHighCPU
          expr: sum(rate(container_cpu_usage_seconds_total{container!=""}[5m])) by (pod, namespace) > 0.9
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} high CPU"
            description: "Pod {{ $labels.pod }} is using more than 90% of its CPU limit for 10 minutes."

    # ── Deployment Alerts ───────────────────────────────────────────────────
    - name: deployment.alerts
      rules:

        - alert: DeploymentReplicasMismatch
          expr: kube_deployment_spec_replicas != kube_deployment_status_available_replicas
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Deployment {{ $labels.namespace }}/{{ $labels.deployment }} replicas mismatch"
            description: "Deployment {{ $labels.deployment }} in {{ $labels.namespace }} has {{ $value }} available replicas but expects more."

        - alert: DeploymentRolloutStuck
          expr: kube_deployment_status_condition{condition="Progressing",status="false"} == 1
          for: 10m
          labels:
            severity: critical
          annotations:
            summary: "Deployment {{ $labels.namespace }}/{{ $labels.deployment }} rollout stuck"
            description: "Deployment {{ $labels.deployment }} rollout has been stuck for more than 10 minutes."
