# =============================================================================
# Kubernetes Deployment - Sample Application
# Author: Vishnu Raj
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-app
  namespace: app
  labels:
    app: sample-app
    version: "1.0.0"
    managed-by: k8s-bootstrapping-toolkit
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sample-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0          # Zero-downtime rolling update
  template:
    metadata:
      labels:
        app: sample-app
        version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
        prometheus.io/path: "/metrics"
    spec:
      # Security context - run as non-root
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 2000

      containers:
        - name: sample-app
          image: vishnuraj/sample-app:1.0.0    # Update with your Docker Hub image
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
              name: http

          env:
            - name: APP_ENV
              value: "production"
            - name: APP_VERSION
              value: "1.0.0"

          # Resource limits
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi

          # Liveness probe - restart container if unhealthy
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3

          # Readiness probe - only route traffic when ready
          readinessProbe:
            httpGet:
              path: /ready
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3

          # Container security
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

      # Ensure pods spread across nodes for HA
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: sample-app
